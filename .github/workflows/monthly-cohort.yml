name: Monthly Customer Cohort Analysis

on:
  schedule:
    - cron: '0 8 1 * *' # 1st of month 08:00 UTC
  workflow_dispatch: {} # manual trigger

permissions:
  contents: write

jobs:
  cohort:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run Customer Cohort Analyst
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [customer-cohort]. Read agents/customer-cohort/SKILL.md for instructions.
            Run monthly customer cohort analysis.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit cohort report
        run: |
          git config user.name "CRO Swarm Bot"
          git config user.email "bot@shopify-cro-swarm.local"
          git add data/cohort-reports/
          git diff --staged --quiet || git commit -m "cohort: monthly analysis $(date +%Y-%m)"
          git push
