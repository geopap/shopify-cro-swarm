name: Implement Hypothesis

on:
  workflow_dispatch:
    inputs:
      hypothesis_id:
        description: 'Hypothesis ID (e.g., HYP-2026-03-23-001)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Verify hypothesis is approved
        run: |
          HYPOTHESIS_FILE=$(find data/hypotheses/ -name '*.json' -exec grep -l '"${{ inputs.hypothesis_id }}"' {} \; | head -1)
          if [ -z "$HYPOTHESIS_FILE" ]; then
            echo "::error::Hypothesis ${{ inputs.hypothesis_id }} not found in data/hypotheses/"
            exit 1
          fi
          STATUS=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('${HYPOTHESIS_FILE}', 'utf8'));
            const hyp = Array.isArray(data) ? data.find(h => h.id === '${{ inputs.hypothesis_id }}') : data;
            console.log(hyp?.status || 'unknown');
          ")
          if [ "$STATUS" != "approved" ]; then
            echo "::error::Hypothesis ${{ inputs.hypothesis_id }} has status '${STATUS}', expected 'approved'"
            exit 1
          fi
          echo "Hypothesis ${{ inputs.hypothesis_id }} is approved. Proceeding with implementation."

      - name: Run Implementer Agent
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            You are [implementer]. Read agents/implementer/SKILL.md for instructions.
            Implement hypothesis: ${{ inputs.hypothesis_id }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--model claude-opus-4-20250514 --max-turns 50 --allowedTools Read,Write,Bash'
        env:
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GITHUB_THEME_REPO: ${{ secrets.GITHUB_THEME_REPO }}
          GITHUB_THEME_TOKEN: ${{ secrets.GITHUB_THEME_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit experiment log updates
        run: |
          git config user.name "CRO Swarm Bot"
          git config user.email "bot@shopify-cro-swarm.local"
          git add data/experiment-log.json
          git diff --staged --quiet || git commit -m "experiment: implement ${{ inputs.hypothesis_id }}"
          git push
