name: Weekly Agents (Monday)

on:
  schedule:
    - cron: '0 7 * * 1' # Monday 07:00 UTC
  workflow_dispatch: {} # manual trigger

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run SEO Agent
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [seo-content]. Read agents/seo-content/SKILL.md for instructions.
            Run weekly SEO review.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GITHUB_THEME_REPO: ${{ secrets.GITHUB_THEME_REPO }}
          GITHUB_THEME_TOKEN: ${{ secrets.GITHUB_THEME_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Content Writer
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [content-writer]. Read agents/content-writer/SKILL.md for instructions.
            Write content from the latest SEO recommendations.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Email Optimizer
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [email-optimizer]. Read agents/email-optimizer/SKILL.md for instructions.
            Run weekly email flow audit.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Landing Page Auditor
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [landing-page-auditor]. Read agents/landing-page-auditor/SKILL.md for instructions.
            Run weekly landing page audit.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          HOTJAR_API_KEY: ${{ secrets.HOTJAR_API_KEY }}
          HOTJAR_SITE_ID: ${{ secrets.HOTJAR_SITE_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Review & Social Proof Agent
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [review-social-proof]. Read agents/review-social-proof/SKILL.md for instructions.
            Run weekly review health audit.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JUDGEME_API_TOKEN: ${{ secrets.JUDGEME_API_TOKEN }}
          JUDGEME_SHOP_DOMAIN: ${{ secrets.JUDGEME_SHOP_DOMAIN }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GITHUB_THEME_REPO: ${{ secrets.GITHUB_THEME_REPO }}
          GITHUB_THEME_TOKEN: ${{ secrets.GITHUB_THEME_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Upsell/Cross-sell Agent
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [upsell-crosssell]. Read agents/upsell-crosssell/SKILL.md for instructions.
            Run weekly product affinity analysis.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GITHUB_THEME_REPO: ${{ secrets.GITHUB_THEME_REPO }}
          GITHUB_THEME_TOKEN: ${{ secrets.GITHUB_THEME_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Pricing Strategist
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [pricing-strategist]. Read agents/pricing-strategist/SKILL.md for instructions.
            Run weekly pricing analysis.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run A/B Test Manager
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [ab-test-manager]. Read agents/ab-test-manager/SKILL.md for instructions.
            Run weekly A/B test planning and monitoring.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Customer Journey Mapper
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [customer-journey]. Read agents/customer-journey/SKILL.md for instructions.
            Run weekly customer journey analysis.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Accessibility Auditor
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [accessibility-auditor]. Read agents/accessibility-auditor/SKILL.md for instructions.
            Run weekly accessibility audit.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GITHUB_THEME_REPO: ${{ secrets.GITHUB_THEME_REPO }}
          GITHUB_THEME_TOKEN: ${{ secrets.GITHUB_THEME_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Retention & Win-back Agent
        uses: anthropics/claude-code-action@v1
        with:
          model: claude-sonnet-4-20250514
          prompt: |
            You are [retention-winback]. Read agents/retention-winback/SKILL.md for instructions.
            Run weekly retention and churn analysis.
          allowed_tools: 'Read,Write,Bash'
          max_turns: 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit weekly agent outputs
        run: |
          git config user.name "CRO Swarm Bot"
          git config user.email "bot@shopify-cro-swarm.local"
          git add data/
          git diff --staged --quiet || git commit -m "weekly: agent reports $(date +%Y-%m-%d)"
          git push
